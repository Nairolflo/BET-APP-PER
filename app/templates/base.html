<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ValueBet FC{% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-label="ValueBet FC">
        <circle cx="13" cy="13" r="12" stroke="#00c896" stroke-width="2"/>
        <circle cx="13" cy="13" r="5" fill="#00c896"/>
        <path d="M13 1 L13 5 M13 21 L13 25 M1 13 L5 13 M21 13 L25 13" stroke="#00c896" stroke-width="1.5"/>
      </svg>
      <span class="logo-text">ValueBet<b>FC</b></span>
    </div>
    <nav class="sidebar-nav">
      <a href="{{ url_for('dashboard.index') }}"
         class="nav-item {% if request.endpoint == 'dashboard.index' %}active{% endif %}">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="{{ url_for('dashboard.history') }}"
         class="nav-item {% if request.endpoint == 'dashboard.history' %}active{% endif %}">
        <span class="nav-icon">📋</span> Historique
      </a>
    </nav>
    <div class="sidebar-footer">
      <span class="version-badge">v1.0.0</span>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        {% block header_title %}<h1>Dashboard</h1>{% endblock %}
      </div>
      <div class="topbar-right">
        <span class="live-badge">● LIVE</span>
        <span class="date-label">{{ today if today else '' }}</span>
      </div>
    </header>
    <div class="page-body">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
